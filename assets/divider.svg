<svg viewBox="0 0 1280 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="comet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38e1ff" stop-opacity="0"/>
      <stop offset="0.6" stop-color="#38e1ff"/>
      <stop offset="1" stop-color="#8affff"/>
    </linearGradient>
  </defs>
  <style>
    .b{animation:bl 2s ease-in-out infinite}
    .b2{animation-delay:.4s}
    .b3{animation-delay:.8s}
    @keyframes bl{0%,100%{opacity:.4}50%{opacity:1}}
  </style>

  <!-- ray -->
  <path d="M0 42 L470 42 L530 16 L750 16 L810 42 L1280 42" fill="none" stroke="#232b3d" stroke-width="5" stroke-linejoin="round"/>

  <!-- yol boyunca kayan ışık şeridi -->
  <rect x="-120" y="-3" width="120" height="6" rx="3" fill="url(#comet)">
    <animateMotion dur="4s" repeatCount="indefinite" rotate="auto"
      path="M0 42 L470 42 L530 16 L750 16 L810 42 L1280 42"/>
  </rect>
  <circle r="5" fill="#8affff">
    <animateMotion dur="4s" repeatCount="indefinite"
      path="M0 42 L470 42 L530 16 L750 16 L810 42 L1280 42"/>
  </circle>

  <!-- orta kapsül -->
  <rect x="585" y="1" width="110" height="32" rx="16" fill="#10162a"/>
  <circle cx="615" cy="17" r="6" fill="#38e1ff" class="b"/>
  <circle cx="640" cy="17" r="6" fill="#8a5cf6" class="b b2"/>
  <circle cx="665" cy="17" r="6" fill="#ff2e88" class="b b3"/>
</svg>
