<svg viewBox="0 0 1280 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38e1ff"/>
      <stop offset="0.5" stop-color="#8a5cf6"/>
      <stop offset="1" stop-color="#ff2e88"/>
    </linearGradient>
  </defs>
  <style>
    .mono{font-family:'Courier New',Courier,monospace;font-weight:bold}
    .pulse{animation:pu 2.5s ease-in-out infinite}
    @keyframes pu{0%,100%{opacity:.45}50%{opacity:1}}
  </style>

  <!-- sol köşe braketi -->
  <path d="M6 64 L6 26 Q6 12 20 12 L70 12" fill="none" stroke="url(#neon)" stroke-width="5" stroke-linecap="round"/>
  <!-- sağ köşe braketi -->
  <path d="M1274 64 L1274 26 Q1274 12 1260 12 L1210 12" fill="none" stroke="url(#neon)" stroke-width="5" stroke-linecap="round"/>

  <!-- braketlerden etikete uzanan çizgiler -->
  <line x1="70" y1="12" x2="480" y2="12" stroke="#232b3d" stroke-width="4"/>
  <line x1="1210" y1="12" x2="800" y2="12" stroke="#232b3d" stroke-width="4"/>
  <rect x="70" y="10" width="60" height="4" fill="#38e1ff" class="pulse"/>
  <rect x="1150" y="10" width="60" height="4" fill="#ff2e88" class="pulse"/>

  <!-- etiket kapsülü -->
  <rect x="480" y="0" width="320" height="34" rx="17" fill="#10162a" stroke="#233047" stroke-width="1.5"/>
  <text x="640" y="23" text-anchor="middle" class="mono" font-size="16" fill="#38e1ff" letter-spacing="4">◈ PIXEL ART ◈</text>
</svg>
