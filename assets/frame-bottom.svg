<svg viewBox="0 0 1280 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38e1ff"/>
      <stop offset="0.5" stop-color="#8a5cf6"/>
      <stop offset="1" stop-color="#ff2e88"/>
    </linearGradient>
    <linearGradient id="comet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38e1ff" stop-opacity="0"/>
      <stop offset="0.6" stop-color="#38e1ff"/>
      <stop offset="1" stop-color="#8affff"/>
    </linearGradient>
  </defs>

  <!-- sol köşe braketi -->
  <path d="M6 0 L6 38 Q6 52 20 52 L70 52" fill="none" stroke="url(#neon)" stroke-width="5" stroke-linecap="round"/>
  <!-- sağ köşe braketi -->
  <path d="M1274 0 L1274 38 Q1274 52 1260 52 L1210 52" fill="none" stroke="url(#neon)" stroke-width="5" stroke-linecap="round"/>

  <!-- alt ray -->
  <line x1="70" y1="52" x2="1210" y2="52" stroke="#232b3d" stroke-width="4"/>

  <!-- ray boyunca akan ışık şeridi -->
  <rect x="-120" y="-3" width="120" height="6" rx="3" fill="url(#comet)">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M70 52 L1210 52"/>
  </rect>
  <circle r="5" fill="#8affff">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M70 52 L1210 52"/>
  </circle>
</svg>
