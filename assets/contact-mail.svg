<svg viewBox="0 0 620 150" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38e1ff"/>
      <stop offset="0.5" stop-color="#8a5cf6"/>
      <stop offset="1" stop-color="#ff2e88"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#1c2a4a"/>
      <stop offset="1" stop-color="#0b0f1e"/>
    </radialGradient>
    <clipPath id="ic"><rect x="30" y="35" width="80" height="80" rx="18"/></clipPath>
  </defs>
  <style>
    .sans{font-family:'Segoe UI',Helvetica,Arial,sans-serif}
    .pulse{animation:pu 2.2s ease-in-out infinite}
    @keyframes pu{0%,100%{opacity:.5}50%{opacity:1}}
    .slide{animation:sl 1.6s ease-in-out infinite}
    @keyframes sl{0%,100%{transform:translateX(0)}50%{transform:translateX(8px)}}
  </style>
  <rect width="620" height="150" rx="16" fill="url(#glow)"/>
  <rect x="1.5" y="1.5" width="617" height="147" rx="15" fill="none" stroke="url(#neon)" stroke-width="2" opacity="0.7"/>
  <rect x="0" y="0" width="620" height="3" rx="1.5" fill="url(#neon)" class="pulse"/>
  <rect x="26" y="31" width="88" height="88" rx="20" fill="#0f1526" stroke="#233047" stroke-width="1.5"/>
  <image x="30" y="35" width="80" height="80" clip-path="url(#ic)" xlink:href="data:image/png;base64,"/>
  <text x="140" y="72" class="sans" font-size="27" font-weight="bold" fill="#ffffff">E-posta</text>
  <text x="140" y="103" class="sans" font-size="16" fill="#7d8590">mustafaemir.ata@outlook.com</text>
  <g class="slide"><text x="555" y="86" class="sans" font-size="30" font-weight="bold" fill="#ff2e88">→</text></g>
</svg>