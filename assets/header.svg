<svg viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d0221"/>
      <stop offset="0.55" stop-color="#2d1b69"/>
      <stop offset="1" stop-color="#833ab4"/>
    </linearGradient>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000" opacity="0.12"/>
    </pattern>
    <rect id="s" width="6" height="6" fill="#ffffff"/>
    <path id="sp" d="M8 0h4v8h8v4h-8v8h-4v-8H0v-4h8z" fill="#ffe066"/>
  </defs>
  <style>
    .mono{font-family:'Courier New',Courier,monospace;font-weight:bold}
    .tw{animation:tw 2.4s ease-in-out infinite}
    .t2{animation-delay:.8s}
    .t3{animation-delay:1.6s}
    @keyframes tw{0%,100%{opacity:.15}50%{opacity:1}}
    .blink{animation:bl 1s steps(1) infinite}
    @keyframes bl{0%,49%{opacity:1}50%,100%{opacity:0}}
  </style>

  <rect width="1280" height="320" fill="url(#sky)"/>

  <!-- yıldızlar -->
  <use href="#s" x="60"  y="40"  class="tw"/>
  <use href="#s" x="160" y="90"  class="tw t2"/>
  <use href="#s" x="240" y="30"  class="tw t3"/>
  <use href="#s" x="330" y="120" class="tw"/>
  <use href="#s" x="420" y="55"  class="tw t2"/>
  <use href="#s" x="520" y="25"  class="tw t3"/>
  <use href="#s" x="610" y="70"  class="tw"/>
  <use href="#s" x="720" y="35"  class="tw t2"/>
  <use href="#s" x="810" y="100" class="tw t3"/>
  <use href="#s" x="900" y="50"  class="tw"/>
  <use href="#s" x="990" y="20"  class="tw t2"/>
  <use href="#s" x="1080" y="80" class="tw t3"/>
  <use href="#s" x="1170" y="45" class="tw"/>
  <use href="#s" x="1230" y="110" class="tw t2"/>
  <use href="#s" x="110" y="150" class="tw t3"/>
  <use href="#s" x="1150" y="160" class="tw"/>

  <!-- ışıltılar -->
  <use href="#sp" x="280" y="60"  class="tw t2"/>
  <use href="#sp" x="860" y="130" class="tw"/>
  <use href="#sp" x="1040" y="40" class="tw t3"/>
  <use href="#sp" x="150" y="200" class="tw"/>

  <!-- pixel dağlar -->
  <polygon fill="#2a1458" points="0,320 0,240 80,240 80,210 180,210 180,240 300,240 300,190 420,190 420,240 560,240 560,215 700,215 700,245 840,245 840,205 960,205 960,240 1100,240 1100,220 1280,220 1280,320"/>
  <polygon fill="#170b38" points="0,320 0,285 100,285 100,265 240,265 240,290 400,290 400,270 560,270 560,295 720,295 720,272 880,272 880,292 1040,292 1040,275 1280,275 1280,320"/>

  <!-- isim -->
  <text x="644" y="154" text-anchor="middle" class="mono" font-size="58" fill="#ff2e88">MUSTAFA EMİR ATA</text>
  <text x="640" y="150" text-anchor="middle" class="mono" font-size="58" fill="#ffffff">MUSTAFA EMİR ATA</text>
  <text x="640" y="200" text-anchor="middle" class="mono" font-size="21" fill="#00ffd5">&lt; Yapay Zeka Destekli Mobil Uygulama Geliştiricisi /&gt;</text>
  <rect x="1000" y="182" width="11" height="20" fill="#00ffd5" class="blink"/>

  <!-- CRT scanline -->
  <rect width="1280" height="320" fill="url(#scan)"/>
</svg>
