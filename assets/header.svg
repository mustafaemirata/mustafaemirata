<svg viewBox="0 0 1280 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d0221"/>
      <stop offset="0.7" stop-color="#2d1b69"/>
      <stop offset="1" stop-color="#4c2f9e"/>
    </linearGradient>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000" opacity="0.1"/>
    </pattern>
    <pattern id="crowd" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="12" height="24" fill="#facc15"/>
      <rect x="12" width="12" height="24" fill="#1e3a8a"/>
    </pattern>
    <rect id="s" width="5" height="5" fill="#ffffff"/>
  </defs>
  <style>
    .mono{font-family:'Courier New',Courier,monospace;font-weight:bold}
    .tw{animation:tw 2.4s ease-in-out infinite}
    .t2{animation-delay:.8s}
    .t3{animation-delay:1.6s}
    @keyframes tw{0%,100%{opacity:.15}50%{opacity:1}}
    .glow{animation:gl 3s ease-in-out infinite}
    @keyframes gl{0%,100%{opacity:.35}50%{opacity:.9}}
    .blink{animation:bl 1s steps(1) infinite}
    @keyframes bl{0%,49%{opacity:1}50%,100%{opacity:0}}
  </style>

  <!-- gökyüzü -->
  <rect width="1280" height="430" fill="url(#sky)"/>

  <!-- yıldızlar -->
  <use href="#s" x="80"  y="30"  class="tw"/>
  <use href="#s" x="200" y="70"  class="tw t2"/>
  <use href="#s" x="320" y="25"  class="tw t3"/>
  <use href="#s" x="450" y="60"  class="tw"/>
  <use href="#s" x="820" y="35"  class="tw t2"/>
  <use href="#s" x="950" y="65"  class="tw t3"/>
  <use href="#s" x="1080" y="28" class="tw"/>
  <use href="#s" x="1200" y="60" class="tw t2"/>
  <use href="#s" x="120" y="110" class="tw t3"/>
  <use href="#s" x="1160" y="115" class="tw"/>

  <!-- üst etiket + başlıklar -->
  <text x="640" y="46" text-anchor="middle" class="mono" font-size="17" fill="#8affff" letter-spacing="14">I S T A N B U L</text>
  <text x="643" y="103" text-anchor="middle" class="mono" font-size="48" fill="#ff2e88">MUSTAFA EMİR ATA</text>
  <text x="640" y="100" text-anchor="middle" class="mono" font-size="48" fill="#ffffff">MUSTAFA EMİR ATA</text>
  <text x="640" y="140" text-anchor="middle" class="mono" font-size="20" fill="#00ffd5">&lt; Mobil Uygulama Geliştiricisi /&gt;</text>
  <rect x="878" y="124" width="10" height="19" fill="#00ffd5" class="blink"/>

  <!-- zemin -->
  <rect y="165" width="1280" height="265" fill="#123c22"/>
  <rect y="165" width="1280" height="8" fill="#1a5230"/>

  <!-- sol evler -->
  <g>
    <rect x="45"  y="330" width="54" height="44" fill="#fde68a"/><rect x="41"  y="318" width="62" height="14" fill="#ea580c"/><rect x="62"  y="344" width="10" height="10" fill="#1e3a8a"/>
    <rect x="130" y="356" width="48" height="40" fill="#fca5a5"/><rect x="126" y="345" width="56" height="13" fill="#b91c1c"/><rect x="146" y="368" width="9"  height="9"  fill="#1e3a8a"/>
    <rect x="215" y="332" width="52" height="46" fill="#fed7aa"/><rect x="211" y="320" width="60" height="14" fill="#c2410c"/><rect x="232" y="346" width="10" height="10" fill="#1e3a8a"/>
    <rect x="90"  y="395" width="16" height="16" fill="#166534"/><rect x="96"  y="386" width="4"  height="10" fill="#166534"/>
    <rect x="196" y="392" width="14" height="14" fill="#166534"/>
    <rect x="60"  y="240" width="56" height="48" fill="#fdba74"/><rect x="56"  y="228" width="64" height="14" fill="#9a3412"/><rect x="78"  y="254" width="10" height="10" fill="#1e3a8a"/>
    <rect x="170" y="255" width="50" height="42" fill="#fde68a"/><rect x="166" y="243" width="58" height="14" fill="#ea580c"/><rect x="188" y="268" width="9" height="9" fill="#1e3a8a"/>
  </g>

  <!-- sağ evler -->
  <g>
    <rect x="1000" y="335" width="54" height="44" fill="#fed7aa"/><rect x="996"  y="323" width="62" height="14" fill="#c2410c"/><rect x="1018" y="349" width="10" height="10" fill="#1e3a8a"/>
    <rect x="1090" y="358" width="48" height="40" fill="#fde68a"/><rect x="1086" y="347" width="56" height="13" fill="#ea580c"/><rect x="1106" y="370" width="9" height="9" fill="#1e3a8a"/>
    <rect x="1175" y="334" width="52" height="46" fill="#fca5a5"/><rect x="1171" y="322" width="60" height="14" fill="#b91c1c"/><rect x="1192" y="348" width="10" height="10" fill="#1e3a8a"/>
    <rect x="1150" y="396" width="16" height="16" fill="#166534"/>
    <rect x="1060" y="242" width="56" height="48" fill="#fde68a"/><rect x="1056" y="230" width="64" height="14" fill="#ea580c"/><rect x="1078" y="256" width="10" height="10" fill="#1e3a8a"/>
    <rect x="1165" y="258" width="50" height="42" fill="#fdba74"/><rect x="1161" y="246" width="58" height="14" fill="#9a3412"/><rect x="1183" y="270" width="9" height="9" fill="#1e3a8a"/>
  </g>

  <!-- stadyum: beyaz çatı halkası -->
  <rect x="330" y="168" width="620" height="238" rx="46" fill="#e5e7eb"/>
  <!-- lacivert dış duvar -->
  <rect x="344" y="180" width="592" height="214" rx="38" fill="#1e3a8a"/>
  <!-- tribünler (sarı-lacivert şeritli) -->
  <rect x="362" y="194" width="556" height="186" rx="30" fill="url(#crowd)"/>
  <!-- iç duvar -->
  <rect x="424" y="218" width="432" height="138" rx="14" fill="#0f2a6b"/>
  <!-- saha -->
  <rect x="440" y="230" width="400" height="114" fill="#15803d"/>
  <rect x="490" y="230" width="50" height="114" fill="#16a34a"/>
  <rect x="590" y="230" width="50" height="114" fill="#16a34a"/>
  <rect x="690" y="230" width="50" height="114" fill="#16a34a"/>
  <rect x="448" y="237" width="384" height="100" fill="none" stroke="#ffffff" stroke-width="3"/>
  <line x1="640" y1="237" x2="640" y2="337" stroke="#ffffff" stroke-width="3"/>
  <circle cx="640" cy="287" r="20" fill="none" stroke="#ffffff" stroke-width="3"/>
  <!-- kale sahaları -->
  <rect x="448" y="262" width="30" height="50" fill="none" stroke="#ffffff" stroke-width="3"/>
  <rect x="802" y="262" width="30" height="50" fill="none" stroke="#ffffff" stroke-width="3"/>
  <!-- skorboard -->
  <rect x="600" y="180" width="80" height="12" rx="3" fill="#0b1220"/>
  <rect x="606" y="183" width="68" height="6" fill="#38e1ff" class="glow"/>

  <!-- projektörler -->
  <g>
    <rect x="336" y="140" width="6" height="30" fill="#94a3b8"/>
    <rect x="326" y="128" width="26" height="14" rx="3" fill="#e5e7eb"/>
    <circle cx="339" cy="135" r="16" fill="#fff7cc" class="glow"/>
    <rect x="938" y="140" width="6" height="30" fill="#94a3b8"/>
    <rect x="928" y="128" width="26" height="14" rx="3" fill="#e5e7eb"/>
    <circle cx="941" cy="135" r="16" fill="#fff7cc" class="glow"/>
  </g>

  <!-- yollar -->
  <rect y="410" width="1280" height="20" fill="#1f2937"/>
  <rect x="20"  y="418" width="40" height="4" fill="#fbbf24"/>
  <rect x="120" y="418" width="40" height="4" fill="#fbbf24"/>
  <rect x="220" y="418" width="40" height="4" fill="#fbbf24"/>
  <rect x="320" y="418" width="40" height="4" fill="#fbbf24"/>
  <rect x="420" y="418" width="40" height="4" fill="#fbbf24"/>
  <rect x="520" y="418" width="40" height="4" fill="#fbbf24"/>
  <rect x="620" y="418" width="40" height="4" fill="#fbbf24"/>
  <rect x="720" y="418" width="40" height="4" fill="#fbbf24"/>
  <rect x="820" y="418" width="40" height="4" fill="#fbbf24"/>
  <rect x="920" y="418" width="40" height="4" fill="#fbbf24"/>
  <rect x="1020" y="418" width="40" height="4" fill="#fbbf24"/>
  <rect x="1120" y="418" width="40" height="4" fill="#fbbf24"/>
  <rect x="1220" y="418" width="40" height="4" fill="#fbbf24"/>

  <!-- CRT scanline -->
  <rect width="1280" height="430" fill="url(#scan)"/>
</svg>
