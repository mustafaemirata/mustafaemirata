name: Profil kartlarini uret

on:
  schedule:
    - cron: "0 3 * * *"   # her gece otomatik guncelle
  workflow_dispatch:        # Actions sekmesinden elle calistirma
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: main
          UTC_OFFSET: 3
