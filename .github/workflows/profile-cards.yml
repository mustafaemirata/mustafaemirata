name: Profil kartlarini uret

on:
  schedule:
    - cron: "0 3 * * *"   # her gece otomatik guncelle
  workflow_dispatch:        # Actions sekmesinden elle calistirma

# Ayni anda iki calisma birbirinin push'unu bozmasin
concurrency:
  group: profile-cards
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: main
          UTC_OFFSET: 3
